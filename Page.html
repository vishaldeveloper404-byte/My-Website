            color:white;
        }

        .card{

            border-radius:20px;

<script>

    // Login check
    if(localStorage.getItem("loggedIn") != "true")
    {
        window.location.href = "index.html"
    }

    // Logout function
    function logout()
    {
        localStorage.removeItem("loggedIn")
        window.location.href = "index.html"
    }

</script>

            <button

            onclick="logout()">
                Logout
            </button>

        <div class="row g-4">
